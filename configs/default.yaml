project:
  name: "Novel JEPA Lab"
  language: "ko"
  seed: 42

ollama:
  base_url: "http://localhost:11434"
  chat_model: "gemma4:e4b"
  embed_model: "embeddinggemma:latest"
  timeout_sec: 120
  num_ctx: 4096
  num_gpu: 40
  num_batch: 128
  keep_alive: "30s"
  manage_vram: true
  retry_attempts: 1
  retry_backoff_sec: 2.0
  fallback_num_ctx: 3072
  fallback_num_gpu: 35
  fallback_num_batch: 64
  fallback_max_tokens: 1200
  fallback_keep_alive: "10s"

data:
  synthetic_path: "data/synthetic/generated.jsonl"
  filtered_path: "data/filtered/filtered.jsonl"
  sample_cache_path: "data/synthetic/sample_cache.jsonl"
  embeddings_path: "data/embeddings/scenes.npz"
  embedding_cache_path: "data/embeddings/embedding_cache.jsonl"
  current_context_index_path: "data/indexes/current_context.faiss"
  faiss_index_path: "data/indexes/next_scene.faiss"
  min_summary_chars: 20
  max_retries: 3
  reuse_existing: true
  allow_legacy_sample_cache: true
  diversity_buckets: 12
  synthetic_temperature: 0.9
  synthetic_max_tokens: 1200
  synthetic_candidate_multiplier: 1.25

training:
  model_type: "residual_mlp"
  input_window: 1
  epochs: 30
  batch_size: 32
  learning_rate: 0.0001
  val_ratio: 0.15
  checkpoint_path: "checkpoints/predictor/best.pt"
  hidden_dim: 1024
  num_layers: 4
  dropout: 0.1
  weight_decay: 0.01
  early_stopping_patience: 8
  gradient_clip_norm: 1.0
  use_amp: false
  use_context_dropout: true
  context_dropout_prob: 0.15
  field_dropout_prob: 0.20
  normalize_prediction: true
  predict_delta: true
  loss_mse_weight: 0.05
  loss_norm_weight: 0.001

generation:
  top_k: 5
  rag_context_limit: 3
  max_tokens: 1600
  temperature: 0.8
  enable_consistency_repair: true
  use_scene_analyzer: true
  style: "한국어 웹소설 문체. 감정선은 선명하게, 장면 전환은 자연스럽게."

evaluation:
  use_llm_judge: false
  repetition_ngram: 4
  report_dir: "reports/runs"
  target_min_chars: 600
  target_max_chars: 1600
  planner_ablation_modes:
    - "rag_current_index"
    - "rag_next_index"
    - "jepa_next_index"
    - "jepa_delta_predictor"
    - "jepa_no_context_dropout"

chat:
  session_dir: "data/sessions"
  recent_messages: 8
  compress_every_messages: 6
  compress_over_chars: 12000
  max_memory_chars: 5000
  auto_update_graph: true
  scene_summary_chars: 700
